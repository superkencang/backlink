name: Sync Backlink dari Issues

on:
  issues:
    types: [opened, edited, labeled, reopened]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        
      - name: Sync dari Issues ke bl.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📥 Mengambil data dari Issues..."
          
          # Ambil semua issue dengan label backlink yang terbuka
          ISSUES=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/issues?labels=backlink&state=open&per_page=100")
          
          echo "📝 Issue yang ditemukan:"
          echo "$ISSUES" | grep -o '"title":"[^"]*"' || echo "Tidak ada issue"
          
          # Ekstrak link dari body issue
          echo '<div class="sponsor-area" style="position:absolute; left:-9999px;">' > bl.txt
          
          # Cari semua tag <a> di body issue
          echo "$ISSUES" | grep -oP '(?<=<a href=")[^"]*' | while read -r url; do
            if [ -n "$url" ]; then
              echo "🔗 Menambahkan link: $url"
              echo "<a href=\"$url\" rel=\"dofollow\">$url</a><br>" >> bl.txt
            fi
          done
          
          echo '</div>' >> bl.txt
          
          echo "✅ Isi bl.txt:"
          cat bl.txt
          
      - name: Commit perubahan
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "🔄 Auto-sync backlink dari Issues"
          file_pattern: "bl.txt"
          commit_user_name: "Backlink Bot"
          commit_user_email: "bot@github.com"
